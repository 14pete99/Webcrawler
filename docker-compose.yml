services:
  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: crawl4ai
    ports:
      - "11235:11235"
    shm_size: "1g"
    restart: unless-stopped
    volumes:
      - ./downloads:/app/downloads
      - ./output:/app/output

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3

  webcrawler:
    build: .
    container_name: webcrawler
    ports:
      - "8888:8000"
    depends_on:
      - crawl4ai
      - minio
    environment:
      - CRAWLER_CRAWL4AI_API=http://crawl4ai:11235
      - CRAWLER_MINIO_ENDPOINT=minio:9000
      - CRAWLER_MINIO_ACCESS_KEY=minioadmin
      - CRAWLER_MINIO_SECRET_KEY=minioadmin
      - CRAWLER_MINIO_BUCKET=crawled-images
      - CRAWLER_MINIO_SECURE=false
    volumes:
      - ./output:/app/output
      - ./data:/app/data
    restart: unless-stopped

volumes:
  minio-data:
